<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        {% block title %}
        Portfolio
        {% endblock %}
    </title>
        <!-- bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom style -->
    <link 
    rel="stylesheet" 
    href={{ url_for('static', filename='css/style.css')}}>
</head>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<body>
    <!-- Navigation bar -->
<nav class="navbar navbar-expand-lg bg-body-tertiary">
  <div class="container-fluid">
    <a class="navbar-brand" href='{{ url_for('home') }}'>Pranav's DataScience Hub</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href='{{ url_for('home') }}'>Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href='{{ url_for('about') }}'>About</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href='{{ url_for('home') }}'>Skills</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href='{{ url_for('home') }}'>Projects</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href='{{ url_for('home') }}'>Timeline</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href='{{ url_for('home') }}'>Contact</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href='{{ url_for('home') }}'>Enter the Lab</a>
        </li>
      </ul>
    </div>
  </div>
</nav>


    <!-- Content Place holder -->
{% block content %}
{% endblock %}


</body>
</html>
